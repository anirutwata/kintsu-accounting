<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans Thai', Arial, sans-serif;
      padding: 20px 24px;
      margin: 0;
      background: #fff;
      color: #333;
    }
    h3 {
      margin: 0 0 16px 0;
      font-size: 15px;
      color: #D33F22;
      border-bottom: 2px solid #D33F22;
      padding-bottom: 8px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-size: 12px;
      font-weight: bold;
      color: #555;
    }
    input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #D33F22;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
    }
    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .checkbox-row span {
      font-size: 13px;
      color: #333;
    }
    .checkbox-note {
      font-size: 11px;
      color: #888;
      margin-left: 24px;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .btn-submit {
      flex: 1;
      padding: 9px;
      background: #D33F22;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-submit:hover { background: #b5351c; }
    .btn-submit:disabled { background: #ccc; cursor: default; }
    .btn-cancel {
      padding: 9px 18px;
      background: #fff;
      color: #666;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-cancel:hover { background: #f5f5f5; }
    .msg { font-size: 12px; margin-top: 10px; padding: 7px 10px; border-radius: 4px; display: none; }
    .msg.error { background: #fde8e8; color: #c00; display: block; }
    .msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .required { color: #D33F22; }
  </style>
</head>
<body>
  <h3>เพิ่มบัญชีธนาคาร</h3>

  <label>ธนาคาร <span class="required">*</span>
    <input type="text" id="bankName" placeholder="เช่น KBANK, TTB, BBL, SCB" />
  </label>

  <label>เลขที่บัญชี
    <input type="text" id="accountNumber" placeholder="เช่น 123-4-56789-0" />
  </label>

  <label>ชื่อบัญชี
    <input type="text" id="accountName" placeholder="เช่น อนิรุจน์ วทานิโยบล" />
  </label>

  <div class="checkbox-row">
    <input type="checkbox" id="isIncome" />
    <span>บัญชีรับรายได้ (✓) — รายได้พร้อมเพย์/โอนเข้าบัญชีนี้</span>
  </div>
  <div class="checkbox-note">* ติ๊กได้ 1 บัญชีเท่านั้น</div>

  <div id="msg" class="msg"></div>

  <div class="btn-row">
    <button class="btn-submit" id="btnSubmit" onclick="submit()">เพิ่มบัญชี</button>
    <button class="btn-cancel" onclick="google.script.host.close()">ยกเลิก</button>
  </div>

  <script>
    function submit() {
      var bankName = document.getElementById('bankName').value.trim();
      var accountNumber = document.getElementById('accountNumber').value.trim();
      var accountName = document.getElementById('accountName').value.trim();
      var isIncome = document.getElementById('isIncome').checked;

      if (!bankName) {
        showMsg('กรุณากรอกชื่อธนาคาร', 'error');
        return;
      }

      var btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.textContent = 'กำลังบันทึก...';
      hideMsg();

      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false;
          btn.textContent = 'เพิ่มบัญชี';
          if (result && result.ok) {
            showMsg('เพิ่มบัญชีสำเร็จ (รหัส ' + result.code + ')', 'success');
            setTimeout(function() { google.script.host.close(); }, 1200);
          } else {
            showMsg(result ? result.msg : 'เกิดข้อผิดพลาด', 'error');
          }
        })
        .withFailureHandler(function(e) {
          btn.disabled = false;
          btn.textContent = 'เพิ่มบัญชี';
          showMsg('เกิดข้อผิดพลาด: ' + e.message, 'error');
        })
        .addBankAccountFromDialog(bankName, accountNumber, accountName, isIncome);
    }

    function showMsg(text, type) {
      var el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }
    function hideMsg() {
      document.getElementById('msg').className = 'msg';
    }
  </script>
</body>
</html>
